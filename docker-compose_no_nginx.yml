services:
  redis:
    image: 'redis:7-alpine'
    command:
      - redis-server
      - '--appendonly'
      - 'yes'
    exclude_from_hc: true
    volumes:
      - 'redis_data:/data'
    restart: unless-stopped

  wa-api:
    build: .
    container_name: wa-api
    env_file:
      - .env
    expose:
      - '3000'
    volumes:
      - './auth:/app/auth'
      - './uploads:/app/uploads'
      - './data:/data'
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --header=\"x-api-key: ${WA_API_KEY}\" http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
    null
