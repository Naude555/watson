services:
  redis:
    image: 'redis:7-alpine'
    command:
      - redis-server
      - '--appendonly'
      - 'yes'
    volumes:
      - 'redis_data:/data'
    restart: unless-stopped

  wa-api:
    build: .
    container_name: wa-api
    env_file:
      - .env
    expose:
      - '3000'
    volumes:
      - './auth:/app/auth'
      - './uploads:/app/uploads'
      - './data:/data'
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "x-api-key: ${API_KEY}", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
    null
