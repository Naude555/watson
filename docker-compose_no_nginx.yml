services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  wa-api:
    build: .
    container_name: wa-api
    env_file: .env
    environment:
      WA_AUTO_CLEAR_AUTH_ON_BOOT: "0"
      WA_FORCE_LATEST_WEB_VERSION: "1"
    expose:
      - "3000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --header=\"x-api-key: ${WA_API_KEY}\" http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
