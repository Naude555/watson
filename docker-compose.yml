services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  wa-api:
    build: .
    container_name: wa-api
    env_file: .env
    environment:
      WA_AUTO_CLEAR_AUTH_ON_BOOT: "0"
      WA_FORCE_LATEST_WEB_VERSION: "1"
    expose:
      - "3000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/data
      - ./ui:/app/ui
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "9287:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - wa-api
    restart: unless-stopped

volumes:
  redis_data:
